name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/backend/**'
      - 'pnpm-lock.yaml'

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    
    # Environment variables for test execution
    env:
      NODE_ENV: test
      ENVIRONMENT: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: lumenpulse
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-key-for-testing-only
      STELLAR_SERVER_SECRET: SB6RIPM3GJQ7RP3Q6R5F3QIBYZHP4N27SGGCQ3R4LWA2ZKXZWQ3NU3G4
      STELLAR_NETWORK: testnet
      API_KEY: ci-test-api-key-only
      NODE_OPTIONS: "--no-warnings --experimental-modules"
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: lumenpulse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "--encoding=UTF8"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ./apps/backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 18 LTS
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'pnpm'
        cache-dependency-path: 'pnpm-lock.yaml'

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --filter=backend

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h $DB_HOST -p $DB_PORT; do
          echo "Waiting for PostgreSQL..."
          sleep 1
        done
      env:
        PGPASSWORD: ${{ env.DB_PASSWORD }}

    - name: Wait for Redis
      run: |
        for i in {1..30}; do
          if redis-cli -h $REDIS_HOST -p $REDIS_PORT ping; then
            exit 0
          fi
          echo "Waiting for Redis... (attempt $i/30)"
          sleep 1
        done
        exit 1

    - name: Run database migrations
      run: npm run migration:run
      continue-on-error: true

    - name: Lint
      run: npm run lint

    - name: Type Check
      run: npm run build -- --noEmit || true

    - name: Run Tests
      run: npm run test -- --passWithNoTests
      env:
        CI: true

    - name: Build
      run: npm run build

    - name: Upload coverage (if available)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: apps/backend/coverage
        retention-days: 5
